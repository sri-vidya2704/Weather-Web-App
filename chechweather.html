<!DOCTYPE html>
<html>
  <head>
    <title>Weather</title>
    <link rel="stylesheet" href="checkweather.css">
  </head>
  <body>

      <div class="searchCard">
        <input  type="text" class="input-js" placeholder="Enter a city name">

      <div class="displayCard">

    </div>
    <script src="checkweather.js"></script>
  </body>
</html>
